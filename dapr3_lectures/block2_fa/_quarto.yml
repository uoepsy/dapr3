project:
  render: 
    - "*.qmd"
    - "!wip/*"
  output-dir: ./wipdocs/

subtitle: "Data Analysis for Psychology in R 3"
author: "Josiah King - josiah.king@ed.ac.uk "
institute:
  - "Psychology, PPLS"
  - "University of Edinburgh"
format:
  revealjs:
    theme: [default, _theme/mystyle.scss]
    width: 1294
    height: 1000
    transition: fade
    slide-number: true
    preview-links: auto
    include-after-body: 
      - _theme/clean_title_page.html
      - _theme/wooclap_iframe.html
      - _theme/wooclap.js
    callout-appearance: simple
    code-line-numbers: false
    code-overflow: wrap
    code-annotations: hover
    code-copy: hover
    classoption: fleqn
    chalkboard: true
revealjs-plugins:
  - attribution
  - codewindow
filters: 
  - "_theme/inverse_part.lua"
  - "_theme/wooclap.lua"
  - line-highlight
highlight-style: breeze
title-slide-attributes:
  data-background-color: "#88B04B"
execute:
  warning: false
  echo: true
  message: false
  fig-format: svg
include-in-header: _theme/highlighter.js
